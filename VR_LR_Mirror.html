<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>VR Mirror</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #fff; font-family: sans-serif; }

    #setup { display: flex; flex-direction: column; align-items: center; gap: 24px; }
    #setup h1 { font-size: 24px; }
    button { padding: 14px 40px; border-radius: 12px; border: none; font-size: 16px; cursor: pointer; background: #3B8BD4; color: #fff; }

    #vr-view { display: none; width: 100vw; height: 100vh; position: relative; }
    canvas { width: 100%; height: 100%; display: block; }
    #close-btn {
      position: absolute; top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
      border: none; color: #fff;
      padding: 8px 20px; border-radius: 20px;
      font-size: 13px; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="setup">
  <h1>VR Mirror</h1>
  <button id="start-btn">カメラを起動</button>
</div>

<div id="vr-view">
  <canvas id="canvas"></canvas>
  <button id="close-btn">終了</button>
</div>

<script>
  const setupEl = document.getElementById('setup');
  const vrEl    = document.getElementById('vr-view');
  const canvas  = document.getElementById('canvas');
  const ctx     = canvas.getContext('2d');

  document.getElementById('start-btn').onclick = startCamera;
  document.getElementById('close-btn').onclick = () => location.reload();

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' },
      audio: false
    });

    const video = document.createElement('video');
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;

    video.onloadedmetadata = () => {
      setupEl.style.display = 'none';
      vrEl.style.display = 'block';
      resizeCanvas();
      draw(video);
    };
  }

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function draw(video) {
    const w = canvas.width / 2;
    const h = canvas.height;

    ctx.save();
    ctx.translate(w, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, w, h);
    ctx.restore();

    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, w, 0, w, h);
    ctx.restore();

    requestAnimationFrame(() => draw(video));
  }

  window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
